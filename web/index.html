<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC26 PS4 Squad Updater</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="page">

      <header class="header">
        <div class="header-badge">PS4 only</div>
        <h1 class="header-title">FC26 Squad Updater</h1>
        <p class="header-subtitle">
          Drop your Squads <code>DATA</code> file to patch it with the latest
          EA squad data — entirely in your browser.
        </p>
      </header>

      <main class="card">
        <!-- Drop zone -->
        <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
             aria-label="Drop DATA file here or click to browse">

          <!-- Default state: no file selected yet -->
          <div id="drop-default" class="drop-zone-inner">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0
                   21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
            </svg>
            <p class="drop-label">Drop <strong>DATA</strong> here</p>
            <p class="drop-hint">or click to browse</p>
          </div>

          <!-- Loaded state: a file has been selected -->
          <div id="drop-loaded" class="drop-zone-inner" hidden>
            <svg class="drop-icon drop-icon--file" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5
                   A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25
                   m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125
                   1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
            <p id="drop-filename" class="drop-file-name"></p>
            <p class="drop-hint">click to change file</p>
          </div>

        </div>

        <!-- Status -->
        <div id="status" class="status" aria-live="polite"></div>

        <!-- Download button (disabled until a patch is ready) -->
        <button id="download-btn" class="btn-download" disabled
                title="Drop or browse a DATA file to get started">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" width="18" height="18">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25
                 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5
                 12m4.5 4.5V3" />
          </svg>
          Download updated DATA
        </button>
      </main>

      <footer class="footer">
        <div class="footer-links">
          <a href="https://github.com/ferrets6/FC26-PS4-SquadUpdater"
             target="_blank" rel="noopener">
            GitHub
          </a>
          <span class="footer-sep">·</span>
          <a href="https://github.com/bucanero/apollo-ps4"
             target="_blank" rel="noopener">
            Apollo Save Tool
          </a>
          <span class="footer-sep">·</span>
          <a href="https://www.youtube.com/watch?v=42Y-4qQmlwY"
             target="_blank" rel="noopener">
            How to use Apollo Save Tool ↗
          </a>
        </div>
        <p class="footer-note">Your file never leaves your browser</p>
      </footer>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
